<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Travel App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="text-center p-3 bg-dark text-white">
        <h1>Travel Explorer</h1>
    </header>

    <!-- Main Section -->
    <main class="container my-5">

        <section class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-12">

                <article class="card shadow p-4">

                    <h2 class="text-center mb-4">Create Account</h2>

                    <form id="signupForm" novalidate>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Full Name</label>
                            <input type="text" id="fullname" class="form-control" required>
                            <small class="text-danger" id="nameError"></small>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                            <small class="text-danger" id="emailError"></small>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" id="phone" class="form-control" required>
                            <small class="text-danger" id="phoneError"></small>
                        </div>

                        <!-- City -->
                        <div class="mb-3">
                            <label for="city" class="form-label">Location / City</label>
                            <input type="text" id="city" class="form-control" required>
                            <small class="text-danger" id="cityError"></small>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 position-relative">
                            <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                              <input type="password" id="password" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">Show</button>
                        </div>
                            <small class="text-danger" id="passwordError"></small>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3 position-relative">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                              <input type="password" id="confirmPassword" class="form-control" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword')">Show</button>
                        </div>
                            <small class="text-danger" id="confirmPasswordError"></small>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Sign Up</button>
                        </div>

                        <!-- Redirect Link -->
                        <p class="text-center mt-3">
                            Already have an account?
                            <a href="SignIn.html">Sign In</a>
                        </p>

                    </form>

                </article>

            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="text-center p-3 bg-dark text-white">
        <p>&copy; 2026 Travel Explorer. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->
    <script src="js/index.js"></script>

</body>
</html>
