<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Travel App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="text-center p-3 bg-dark text-white">
        <h1>Travel Explorer</h1>
    </header>

    <!-- Main Section -->
    <main class="container my-5">

        <section class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-12">

                <article class="card shadow p-4">

                    <h2 class="text-center mb-4">Sign In</h2>

                    <form id="signinForm" novalidate>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="signinEmail" class="form-label">Email</label>
                            <input type="email" id="signinEmail" class="form-control" required>
                            <small class="text-danger" id="signinEmailError"></small>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 position-relative">
                            <label for="signinPassword" class="form-label">Password</label>
                            <div class="input-group">
                              <input type="password" id="signinPassword" class="form-control" required>
                              <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('signinPassword')">Show</button>
                        </div>
                            <small class="text-danger" id="signinPasswordError"></small>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Sign In</button>
                        </div>

                        <!-- Redirect Link -->
                        <p class="text-center mt-3">
                            Don’t have an account?
                            <a href="SignUp.html">Sign Up</a>
                        </p>

                    </form>

                </article>

            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="text-center p-3 bg-dark text-white">
        <p>&copy; 2026 Travel Explorer. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->
    <script src="js/index.js"></script>

</body>
</html>
